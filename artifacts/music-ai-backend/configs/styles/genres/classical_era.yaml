id: classical_era
display_name: "תקופה קלאסית"
era: "1750-1820"
region: "Europe / Vienna / Austria"
parent_genre: "classical"

harmony:
  scale_type: "major"
  characteristic_intervals: ["M3", "P5", "M7", "M9"]
  typical_progressions:
    - ["I", "V", "I", "IV", "I", "V7", "I"]
    - ["I", "ii6", "V7", "I"]
    - ["I", "IV", "ii", "V", "I"]
  cadences: ["perfect_authentic", "half", "deceptive", "plagal"]

rhythm:
  time_signature: "4/4"
  bpm_range: [60, 140]
  feel: "balanced_phrase"
  characteristic_patterns:
    - name: "alberti_bass"
      pattern: "low_high_mid_high"
    - name: "um_pah_pah"
      pattern: "bass_chord_chord"
    - name: "four_bar_phrase"
      pattern: "antecedent_consequent"

instrumentation:
  core: ["piano", "strings", "woodwinds", "brass"]
  optional: ["harpsichord", "horns", "timpani"]
  avoid: ["synthesizer", "electric_instruments"]

ornaments:
