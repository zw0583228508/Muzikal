    description: "סטראמינג מהיר על הוואויה"
    instruments: ["vihuela"]

reference_artists: ["Pedro Infante", "Jorge Negrete", "Vicente Fernández", "Mariachi Vargas de Tecalitlán"]
reference_pieces: ["Cielito Lindo", "La Bamba", "México Lindo y Querido", "Guadalajara"]

