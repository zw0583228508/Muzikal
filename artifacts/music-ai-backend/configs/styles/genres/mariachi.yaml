id: mariachi
display_name: "מריאצ'י"
era: "1850s-present"
region: "Jalisco / Mexico"
parent_genre: "mexican"

harmony:
  scale_type: "major"
  characteristic_intervals: ["M3", "P5", "b7"]
  typical_progressions:
    - ["I", "IV", "V7", "I"]
    - ["I", "V7", "I", "IV"]
    - ["i", "V7", "i", "bVII"]
  cadences: ["authentic_mexican", "half"]

rhythm:
  time_signature: "3/4"
  bpm_range: [100, 180]
  feel: "ranchera_waltz"
  characteristic_patterns:
    - name: "son_jaliscience"
