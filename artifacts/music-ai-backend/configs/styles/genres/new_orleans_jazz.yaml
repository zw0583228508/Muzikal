id: new_orleans_jazz
display_name: "ג'אז ניו אורלינס"
era: "1900s-1930s"
region: "New Orleans / Louisiana"
parent_genre: "jazz"

harmony:
  scale_type: "major"
  characteristic_intervals: ["b3", "b7", "M9"]
  typical_progressions:
    - ["I7", "IV7", "I7", "V7"]
    - ["I", "VI7", "II7", "V7"]
    - ["i7", "IV7", "bVII7", "V7"]
  cadences: ["jazz_authentic", "blues_turnaround"]
  extended_harmony: true

rhythm:
  time_signature: "4/4"
  bpm_range: [100, 180]
  feel: "dixieland_swing"
  characteristic_patterns:
