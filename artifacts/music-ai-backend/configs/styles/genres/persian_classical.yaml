id: persian_classical
display_name: "מוזיקה קלאסית פרסית"
era: "Qajar era-present"
region: "Iran / Persia"
parent_genre: "middle_eastern"

harmony:
  scale_type: "dastgah_shur"
  characteristic_intervals: ["neutral2", "b3", "neutral6", "b7"]
  typical_progressions:
    - ["i", "bII", "i", "V"]
    - ["i", "bVII", "i", "bII"]
  cadences: ["shur_forud", "mahour_karar"]

rhythm:
  time_signature: "6/8"
  bpm_range: [50, 140]
