    description: "ביצוע קולי של ויברטו ורצינוף"
    instruments: ["voice"]
  - type: "forud"
    description: "ירידה טקסית אל הטוניקה"
  - type: "gusheh"
    description: "יחידה מלודית עצמאית בתוך הדסטגאה"

reference_artists: ["Mohammad Reza Shajarian", "Ali Akbar Shahnazi", "Dariush Talai"]
