id: reggaeton
display_name: "רגאטון"
era: "1990s-present"
region: "Puerto Rico / Panama"
parent_genre: "latin_urban"

harmony:
  scale_type: "minor"
  characteristic_intervals: ["b3", "b7", "P5"]
  typical_progressions:
    - ["i", "bVII", "bVI", "bVII"]
    - ["i", "iv", "bVII", "i"]
    - ["i", "bVI", "bVII", "i"]
  cadences: ["loop_vamp", "urban_half"]

rhythm:
  time_signature: "4/4"
  bpm_range: [80, 100]
  feel: "dembow_groove"
  characteristic_patterns:
    - name: "dembow"
      pattern: "k..k.s.ks.k.s.."
    - name: "perreo_groove"
      pattern: "k..s.k..s.k.s."
    - name: "hi_hat_32nd"
      pattern: "rapid_hi_hat_roll"

instrumentation:
  core: ["drum_machine", "bass_synth", "synthesizer", "voice"]
  optional: ["piano", "guitar_sample", "brass_sample", "strings_sample"]
  avoid: ["acoustic_instruments_prominent", "live_drums"]

ornaments:
  - type: "dembow_kick"
    description: "הקיק ה'דמבו' — לב הרגאטון"
    instruments: ["drum_machine"]
  - type: "vocal_ad_lib"
    description: "שאקות ואדליבים רקע"
    instruments: ["voice"]
  - type: "auto_tune_slide"
    description: "גלישת Auto-Tune בין תווים"
    instruments: ["voice"]

reference_artists: ["Daddy Yankee", "Don Omar", "Bad Bunny", "J Balvin", "Nicky Jam"]
reference_pieces: ["Gasolina", "Danza Kuduro", "Despacito", "Mi Gente", "Con Calma"]

gm_programs:
  bass: 38
  synthesizer: 81
  piano: 0
  brass: 61
