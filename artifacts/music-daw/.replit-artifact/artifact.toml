kind = "web"
previewPath = "/"
title = "MusicAI Studio"
version = "1.0.0"
id = "artifacts/music-daw"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19270

[services.development]
run = "pnpm --filter @workspace/music-daw run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/music-daw", "run", "build" ]
publicDir = "artifacts/music-daw/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19270"
BASE_PATH = "/"
